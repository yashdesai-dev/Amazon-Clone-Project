<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAZON</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="navbar">
            <div class="nav-logo border ">
                <div class="logo"></div>
            </div>
            <div class="nav-address border">
                <p class="address-1">Delivered to</p>
                <div class="add-icon"> <i class="fa-solid fa-location-dot "></i>
                    <p class="address-2">India</p>
                </div>
            </div>
            <div class="nav-search">
                <select class="nav-select" id="">
                    <option value="">All</option>
                    <input type="text" placeholder="Search Amazon" class="nav-input">
                    <div class="search-ico"><i class="fa-solid fa-magnifying-glass"></i></div>
                </select>
            </div>
            <div class="select-contry">
                <div class="contry-logo border"></div>
                <select >
                    <option >
                        <span class="cont-name">EN</span>
                    </option>
                </select>
            </div>
        </div>

    </header>
</body>

</html>
