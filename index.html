<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAZON</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="navbar">
            <div class="nav-logo border ">
                <div class="logo"></div>
            </div>
            <div class="nav-address border">
                <p class="address-1">Delivered to</p>
                <div class="add-icon"> <i class="fa-solid fa-location-dot "></i>
                    <p class="address-2">India</p>
                </div>
            </div>
            <div class="nav-search border2">
                <select class="nav-select" id="">
                    <option value="">All</option>
                    <input type="text" placeholder="Search Amazon" class="nav-input">
                    <div class="search-ico"><i class="fa-solid fa-magnifying-glass"></i></div>
                </select>
            </div>
            <div class="select-contry border">
                <div class="contry-logo "></div> <select class="opt">
                    <option>
                        EN
                    </option>
                </select>
            </div>
            <div class="nav-signing border">
                <p> <span>Hello,sign in</span></p>
                <p class="nav-second">Account & List</p>
            </div>
            <div class="nav-return border">
                <p> <span>Returns</span></p>
                <p class="nav-second">& Orders</p>
            </div>
            <div class="nav-cart border"><i class="fa-solid fa-cart-shopping"></i>Cart</div>
        </div>
        <div class="panel">
            <div class="pannel-all border"><i class="fa-solid fa-bars "></i>
                All</div>
            <div class="panel-ops">
                <p class="border">Today's Deals</p>
                <p class="border">Gift Cards</p>
                <p class="border">Sell</p>
                <p class="border">Registry</p>
                <p class="border">Prime Video</p>
                <p class="border width">Customer Service</p>
            </div>
        </div>
    </header>
    <div class="hero-section">
        <div class="hero-mesasge">You are on amazon.com. You can also shop on Amazon India for millions of products with
            fast local delivery. <a href="">Click here to go to amazon.in</a> </div>
    </div>
</body>

</html>
